<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Memory Demo</title>
  <style>
    :root {
      color-scheme: dark;
      --demo-size: 848px;
      --aqua: #55edf0;
      --aqua-strong: #03bfd0;
      --dark: #050607;
      --panel: #11151b;
      --panel-soft: #1a2029;
      --stroke: #2a303c;
      --muted: #a0a8b5;
      --text: #f5f7fb;
      font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Helvetica, Arial, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      background: #000;
      padding: 0;
    }

    button,
    input {
      font: inherit;
    }

    .memory-demo {
      width: min(100%, var(--demo-size));
      aspect-ratio: 1;
      position: relative;
      overflow: hidden;
      border-radius: 18px;
      background:
        radial-gradient(circle at 17% 14%, rgba(236, 255, 255, .72) 0 9%, rgba(236, 255, 255, .35) 18%, rgba(236, 255, 255, 0) 38%),
        linear-gradient(135deg, #aef9f7 0%, #41d5d7 46%, #adfaf6 100%);
      box-shadow: 0 30px 90px rgba(44, 238, 240, .14);
      isolation: isolate;
    }

    .memory-demo::before {
      content: "";
      position: absolute;
      width: 118%;
      height: 118%;
      left: -11%;
      top: 13%;
      border: 9px solid rgba(221, 255, 255, .32);
      border-radius: 50%;
      filter: blur(2px);
      opacity: .9;
      pointer-events: none;
    }

    .memory-demo::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(120deg, rgba(255, 255, 255, .16), rgba(255, 255, 255, 0) 38% 68%, rgba(255, 255, 255, .2));
      pointer-events: none;
      z-index: 1;
    }

    .memory-cover,
    .memory-app {
      position: absolute;
      inset: 0;
      z-index: 2;
      transition: opacity .45s ease, transform .55s cubic-bezier(.2, .8, .2, 1);
    }

    .memory-cover {
      display: grid;
      place-items: center;
      align-content: center;
      gap: 42px;
      padding: 9%;
    }

    .memory-cover.is-hidden {
      opacity: 0;
      transform: scale(1.04);
      pointer-events: none;
    }

    .memory-start {
      width: min(86%, 650px);
      min-height: 128px;
      border: 0;
      border-radius: 999px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: clamp(18px, 3.2vw, 28px);
      padding: 0 clamp(24px, 6vw, 54px);
      color: var(--aqua-strong);
      background: rgba(238, 255, 255, .78);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, .8), 0 24px 70px rgba(0, 134, 145, .12);
      cursor: pointer;
      transition: transform .2s ease, background .2s ease, box-shadow .2s ease;
    }

    .memory-start:hover {
      transform: translateY(-2px);
      background: rgba(246, 255, 255, .9);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, .9), 0 30px 80px rgba(0, 134, 145, .18);
    }

    .brain-icon {
      width: 60px;
      height: 60px;
      flex: 0 0 auto;
    }

    .memory-title {
      min-width: 0;
      font-size: clamp(34px, 5.1vw, 56px);
      line-height: 1;
      font-weight: 700;
      letter-spacing: 0;
      overflow-wrap: anywhere;
      text-align: center;
    }

    .cover-hint {
      margin: 0;
      color: rgba(246, 255, 255, .86);
      font-size: 19px;
      line-height: 1.2;
      font-weight: 500;
      letter-spacing: .01em;
      text-align: center;
      text-shadow: 0 2px 12px rgba(0, 101, 111, .24);
    }

    .memory-app {
      --follow-x: 0px;
      --shell-transition: .9s;
      display: grid;
      place-items: center;
      padding: 48px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, .025), rgba(255, 255, 255, 0) 28%),
        var(--dark);
      color: var(--text);
      opacity: 0;
      transform: translateY(18px) scale(.985);
      pointer-events: none;
    }

    .memory-app::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 50% 76%, rgba(255, 255, 255, .08), rgba(255, 255, 255, 0) 28%),
        rgba(0, 0, 0, .58);
      opacity: 0;
      pointer-events: none;
      transition: opacity .65s ease;
      z-index: 1;
    }

    .memory-app.is-active {
      opacity: 1;
      transform: none;
      pointer-events: auto;
    }

    .memory-app.is-focusing::before,
    .memory-app.is-following::before,
    .memory-app.is-reading::before {
      opacity: 1;
    }

    .memory-shell {
      position: relative;
      z-index: 2;
      width: min(100%, 650px);
      min-height: 390px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 24px;
      transform-origin: center bottom;
      transition:
        min-height .55s cubic-bezier(.2, .8, .2, 1),
        justify-content .55s cubic-bezier(.2, .8, .2, 1),
        transform var(--shell-transition) cubic-bezier(.16, 1, .3, 1);
      will-change: transform;
    }

    .memory-app.is-focusing .memory-shell {
      transform: translateY(92px) scale(1.17);
    }

    .memory-app.is-following .memory-shell {
      transform: translate(var(--follow-x), 152px) scale(1.88);
    }

    .memory-app.is-reading .memory-shell {
      transform: translateY(-74px) scale(1.12);
    }

    .memory-shell.has-chat {
      min-height: 100%;
      justify-content: flex-end;
      gap: 18px;
    }

    .hero-copy {
      text-align: center;
      transition: opacity .55s ease, transform .7s cubic-bezier(.16, 1, .3, 1), max-height .25s ease, margin .25s ease;
      overflow: hidden;
    }

    .memory-app.is-focusing .hero-copy,
    .memory-app.is-following .hero-copy,
    .memory-app.is-reading .hero-copy {
      opacity: .12;
      transform: translateY(-34px) scale(.9);
    }

    .memory-shell.has-chat .hero-copy {
      max-height: 0;
      opacity: 0;
      transform: translateY(-8px);
      margin: 0;
    }

    .hero-copy h1 {
      margin: 0;
      font-size: clamp(30px, 4.7vw, 43px);
      line-height: 1.12;
      font-weight: 400;
      letter-spacing: 0;
    }

    .hero-copy p {
      margin: 14px 0 0;
      color: var(--muted);
      font-size: clamp(18px, 2.5vw, 24px);
      line-height: 1.2;
      font-weight: 400;
    }

    .chat-feed {
      display: none;
      flex: 1;
      min-height: 0;
      align-content: end;
      gap: 12px;
      overflow: hidden;
    }

    .memory-shell.has-chat .chat-feed {
      display: grid;
      animation: chat-in .28s ease both;
    }

    @keyframes chat-in {
      from {
        opacity: 0;
        transform: translateY(8px);
      }
      to {
        opacity: 1;
        transform: none;
      }
    }

    .message {
      max-width: 86%;
      border-radius: 18px;
      padding: 13px 15px;
      font-size: 15px;
      line-height: 1.45;
      font-weight: 400;
    }

    .message.user {
      justify-self: end;
      border-bottom-right-radius: 7px;
      background: #242a34;
      color: var(--text);
    }

    .message.assistant {
      justify-self: start;
      border-bottom-left-radius: 7px;
      background: transparent;
      color: #e9edf4;
      padding-left: 0;
      transition:
        background .55s ease,
        box-shadow .55s ease,
        border-color .55s ease,
        padding .55s ease,
        transform .55s cubic-bezier(.16, 1, .3, 1);
    }

    .memory-app.is-reading .message.assistant {
      width: min(100%, 590px);
      max-width: 590px;
      border: 1px solid rgba(255, 255, 255, .08);
      background: rgba(22, 26, 34, .94);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, .07), 0 26px 70px rgba(0, 0, 0, .34);
      padding: 16px 18px;
      transform: translateY(-8px);
    }

    .message.cta {
      justify-self: start;
      padding: 0;
      background: transparent;
    }

    .thinking {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      min-height: 22px;
    }

    .thinking span {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #9aa3af;
      animation: thinking 1.2s ease-in-out infinite;
    }

    .thinking span:nth-child(2) {
      animation-delay: .16s;
    }

    .thinking span:nth-child(3) {
      animation-delay: .32s;
    }

    @keyframes thinking {
      0%, 80%, 100% {
        opacity: .35;
        transform: translateY(0);
      }
      40% {
        opacity: 1;
        transform: translateY(-3px);
      }
    }

    .assistant-text {
      display: block;
      white-space: pre-line;
      color: #e9edf4;
      font-size: 15px;
      line-height: 1.5;
      max-width: 560px;
    }

    .assistant-highlight {
      display: block;
      max-width: 560px;
      margin-top: 12px;
      border: 1px solid rgba(255, 255, 255, .09);
      border-radius: 14px;
      background: rgba(255, 255, 255, .055);
      color: #f4f7fb;
      padding: 11px 13px;
      font-size: 15px;
      line-height: 1.45;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, .05);
    }

    .join-meeting {
      min-height: 40px;
      border: 0;
      border-radius: 999px;
      padding: 0 17px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 9px;
      background: #f4f7fb;
      color: #12161d;
      font-size: 14px;
      font-weight: 500;
      box-shadow: 0 14px 32px rgba(0, 0, 0, .26), inset 0 1px 0 rgba(255, 255, 255, .7);
      opacity: 0;
      transform: translateY(8px);
      transition: opacity .45s ease, transform .45s cubic-bezier(.16, 1, .3, 1), background .2s ease;
    }

    .join-meeting.is-visible {
      opacity: 1;
      transform: none;
    }

    .join-meeting:hover {
      background: #fff;
    }

    .demo-cursor {
      --cursor-x: 50px;
      --cursor-y: 50px;
      position: absolute;
      left: 0;
      top: 0;
      width: 23px;
      height: 23px;
      color: #f4f7fb;
      opacity: 0;
      z-index: 5;
      filter: drop-shadow(0 8px 14px rgba(0, 0, 0, .45));
      transform: translate(var(--cursor-x), var(--cursor-y)) scale(.92);
      transition:
        opacity .28s ease,
        transform 1.15s cubic-bezier(.16, 1, .3, 1);
      pointer-events: none;
    }

    .demo-cursor.is-visible {
      opacity: 1;
    }

    .demo-cursor.is-clicking {
      transform: translate(var(--cursor-x), var(--cursor-y)) scale(.82);
    }

    .demo-cursor svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    .composer {
      position: relative;
      min-height: 120px;
      border: 1px solid var(--stroke);
      border-radius: 18px;
      background: var(--panel);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, .04), 0 28px 70px rgba(0, 0, 0, .28);
      display: flex;
      flex-direction: column;
      padding: 18px;
      transition:
        min-height .45s cubic-bezier(.16, 1, .3, 1),
        transform .85s cubic-bezier(.16, 1, .3, 1),
        border-color .55s ease,
        box-shadow .55s ease;
    }

    .memory-app.is-focusing .composer,
    .memory-app.is-following .composer {
      border-color: rgba(255, 255, 255, .16);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, .08),
        0 34px 90px rgba(0, 0, 0, .42);
    }

    .memory-shell.has-chat .composer {
      min-height: 92px;
    }

    .prompt-input {
      width: 100%;
      min-height: 36px;
      border: 0;
      outline: 0;
      background: transparent;
      color: var(--text);
      font-size: 19px;
      font-weight: 400;
      pointer-events: none;
    }

    .typed-text {
      position: absolute;
      left: 18px;
      top: 18px;
      max-width: calc(100% - 36px);
      min-height: 36px;
      color: var(--text);
      font-size: 19px;
      font-weight: 400;
      white-space: nowrap;
      overflow: hidden;
      pointer-events: none;
      opacity: 0;
    }

    .typed-text.is-visible {
      opacity: 1;
    }

    .typed-text.is-typing::after {
      content: "";
      display: inline-block;
      width: 2px;
      height: 1.12em;
      margin-left: 4px;
      background: #f4f7fb;
      vertical-align: -3px;
      animation: caret 1s steps(1) infinite;
      box-shadow: 0 0 12px rgba(244, 247, 251, .42);
    }

    .memory-shell.has-chat .prompt-input {
      font-size: 16px;
    }

    .memory-shell.has-chat .typed-text {
      display: none;
    }

    .prompt-input::placeholder {
      color: #a7afbc;
    }

    .composer-actions {
      margin-top: auto;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .icon-btn,
    .project-btn {
      border: 0;
      cursor: pointer;
      color: #f0f4f8;
      transition: transform .18s ease, background .18s ease;
    }

    .icon-btn {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: var(--panel-soft);
    }

    .icon-btn:hover,
    .project-btn:hover {
      transform: translateY(-1px);
      background: #232a34;
    }

    .project-btn {
      height: 38px;
      border-radius: 8px;
      background: var(--panel-soft);
      display: inline-flex;
      align-items: center;
      gap: 9px;
      padding: 0 14px;
      font-size: 15px;
      font-weight: 500;
    }

    .project-btn span {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .project-picker {
      position: relative;
    }

    .project-btn.is-active {
      background: #26303c;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, .08);
    }

    .project-menu {
      position: absolute;
      left: 0;
      bottom: calc(100% + 10px);
      z-index: 6;
      width: 282px;
      padding: 8px;
      border: 1px solid rgba(255, 255, 255, .1);
      border-radius: 14px;
      background: rgba(20, 25, 32, .98);
      box-shadow: 0 22px 60px rgba(0, 0, 0, .42), inset 0 1px 0 rgba(255, 255, 255, .05);
      opacity: 0;
      transform: translateY(8px) scale(.98);
      pointer-events: none;
      transition: opacity .25s ease, transform .25s cubic-bezier(.16, 1, .3, 1);
    }

    .project-menu.is-open {
      opacity: 1;
      transform: none;
      pointer-events: auto;
    }

    .project-option {
      width: 100%;
      min-height: 40px;
      border: 0;
      border-radius: 9px;
      display: flex;
      align-items: center;
      padding: 0 11px;
      color: #edf2f7;
      background: transparent;
      font-size: 14px;
      line-height: 1.25;
      text-align: left;
      cursor: pointer;
      transition: background .18s ease, color .18s ease, transform .18s ease;
    }

    .project-option:hover,
    .project-option.is-selected {
      background: rgba(85, 237, 240, .13);
      color: #fff;
    }

    .project-option.is-selected {
      transform: translateX(2px);
    }

    .send-btn {
      margin-left: auto;
      width: 44px;
      height: 44px;
      background: #f4f7fb;
      color: #262b31;
    }

    .send-btn:hover {
      background: #fff;
    }

    .icon-btn:disabled {
      cursor: default;
      opacity: .72;
      transform: none;
    }

    .send-btn.is-sending {
      opacity: 1;
      transform: scale(.96);
      background: #fff;
    }

    .icon {
      width: 21px;
      height: 21px;
      flex: 0 0 auto;
    }

    .typing-caret::after {
      content: "";
      display: inline-block;
      width: 2px;
      height: 1em;
      margin-left: 2px;
      background: var(--aqua);
      vertical-align: -2px;
      animation: caret 1s steps(1) infinite;
    }

    .source-row {
      display: inline-flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 9px;
      margin-top: 13px;
      color: #cfd6e2;
      font-size: 14px;
    }

    .source-icons {
      display: inline-flex;
      gap: 7px;
    }

    .source-icon {
      width: 34px;
      height: 34px;
      border: 1px solid rgba(255, 255, 255, .1);
      border-radius: 10px;
      display: grid;
      place-items: center;
      background: rgba(255, 255, 255, .07);
      color: #f6fbff;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, .06);
    }

    .source-icon svg {
      width: 18px;
      height: 18px;
      display: block;
    }

    @keyframes caret {
      50% {
        opacity: 0;
      }
    }

    @media (max-width: 720px) {
      body {
        padding: 0;
      }

      .memory-demo {
        border-radius: 14px;
      }

      .memory-start {
        width: 88%;
        min-height: 92px;
        gap: 16px;
        padding: 0 24px;
      }

      .brain-icon {
        width: 42px;
        height: 42px;
      }

      .memory-title {
        font-size: 31px;
      }

      .cover-hint {
        font-size: 15px;
      }

      .memory-app {
        padding: 22px;
      }

      .memory-shell {
        min-height: 330px;
      }

      .hero-copy h1 {
        font-size: 28px;
      }

      .hero-copy p {
        font-size: 18px;
      }

      .composer {
        min-height: 108px;
        padding: 14px;
      }

      .prompt-input {
        font-size: 16px;
      }

      .project-btn {
        max-width: 162px;
        padding: 0 10px;
        font-size: 12px;
      }

      .project-menu {
        width: 238px;
      }

      .project-option {
        font-size: 12px;
      }

      .message {
        max-width: 94%;
        font-size: 13px;
      }
    }
  </style>
</head>
<body>
  <section class="memory-demo" aria-label="Интерактивное демо функции Memory">
    <div class="memory-cover" data-cover>
      <button class="memory-start" type="button" data-start aria-label="Запустить демо Memory">
        <svg class="brain-icon" viewBox="0 0 64 64" aria-hidden="true">
          <path d="M23 10c-6.5 0-10 4.4-10 10.2v1.1C8.8 23.4 6 27.7 6 32.8c0 5 2.6 9.2 6.6 11.4v.7c0 5.5 4.3 9.8 9.8 9.8H31V14.8C29.2 11.8 26.4 10 23 10Z" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M41 10c6.5 0 10 4.4 10 10.2v1.1c4.2 2.1 7 6.4 7 11.5 0 5-2.6 9.2-6.6 11.4v.7c0 5.5-4.3 9.8-9.8 9.8H33V14.8C34.8 11.8 37.6 10 41 10Z" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M20 24c3 0 5.4 2.4 5.4 5.4M15 38c5.1 0 9.2 4.1 9.2 9.2M44 24c-3 0-5.4 2.4-5.4 5.4M49 38c-5.1 0-9.2 4.1-9.2 9.2M31 31h-7M33 31h7" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round"/>
        </svg>
        <span class="memory-title">Memory</span>
      </button>
      <p class="cover-hint">Нажмите для просмотра</p>
    </div>

    <div class="memory-app" data-app>
      <main class="memory-shell" data-shell>
        <section class="hero-copy" aria-label="Приветствие">
          <h1>Привет, Денис 👋</h1>
          <p>Чем могу помочь сегодня?</p>
        </section>

        <section class="chat-feed" data-chat aria-live="polite" aria-label="Чат Executive AI"></section>

        <form class="composer" data-form>
          <span class="typed-text" data-typed-text aria-hidden="true"></span>
          <input class="prompt-input" data-input type="search" autocomplete="off" readonly placeholder="Спросите Executive AI...">
          <div class="composer-actions">
            <button class="icon-btn" type="button" aria-label="Прикрепить файл">
              <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
                <path d="m21.4 11.6-8.6 8.6a6 6 0 0 1-8.5-8.5l9.7-9.7a4 4 0 0 1 5.7 5.7L10 17.4a2 2 0 0 1-2.8-2.8l8.6-8.6" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              </svg>
            </button>
            <div class="project-picker">
              <button class="project-btn" type="button" data-project-button aria-haspopup="listbox" aria-expanded="false">
                <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M3 7.5A2.5 2.5 0 0 1 5.5 5H9l2 2h7.5A2.5 2.5 0 0 1 21 9.5V19H3V7.5Z" fill="none" stroke="currentColor" stroke-width="2"/>
                </svg>
                <span data-project-label>Выбрать проект</span>
              </button>
              <div class="project-menu" data-project-menu role="listbox" aria-label="Список проектов">
                <button class="project-option" type="button" role="option" data-project-option="Разработка нового продукта">Разработка нового продукта</button>
                <button class="project-option" type="button" role="option" data-project-option="Переговоры о партнерстве">Переговоры о партнерстве</button>
                <button class="project-option" type="button" role="option" data-project-option="Разработка финансового плана">Разработка финансового плана</button>
              </div>
            </div>
            <button class="icon-btn send-btn" type="submit" aria-label="Отправить запрос" disabled>
              <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M12 20V5M5.5 11.5 12 5l6.5 6.5" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </button>
          </div>
        </form>
      </main>
      <div class="demo-cursor" data-cursor aria-hidden="true">
        <svg viewBox="0 0 24 24">
          <path d="M5 3.5 19.5 14 13 15.2 10.1 21 5 3.5Z" fill="currentColor" stroke="#0b0d10" stroke-width="1.4" stroke-linejoin="round"/>
        </svg>
      </div>
    </div>
  </section>

  <script>
    const cover = document.querySelector("[data-cover]");
    const app = document.querySelector("[data-app]");
    const start = document.querySelector("[data-start]");
    const shell = document.querySelector("[data-shell]");
    const form = document.querySelector("[data-form]");
    const input = document.querySelector("[data-input]");
    const typedText = document.querySelector("[data-typed-text]");
    const chat = document.querySelector("[data-chat]");
    const sendButton = document.querySelector(".send-btn");
    const demoCursor = document.querySelector("[data-cursor]");
    const projectButton = document.querySelector("[data-project-button]");
    const projectLabel = document.querySelector("[data-project-label]");
    const projectMenu = document.querySelector("[data-project-menu]");
    const projectOptions = [...document.querySelectorAll("[data-project-option]")];
    const selectedProject = "Разработка нового продукта";
    const scenarioQuery = "Когда встреча с командой продукта?";
    let scenarioStarted = false;

    const meetingBrief = `Встреча сегодня в 15:00.
На встрече будет: продакт-менеджер, разработчик и аналитик.

На встрече нужно обсудить:

• статус запуска
• готовность демо-версии продукта
• интеграцию с CRM

Главное: проверить onboarding-сценарий продукта (дедлайн был - пятница).`;
    const meetingHighlight = "Во время встречи зафиксирую решения, создам новые задачи и назначу ответственных.";

    function openDemo() {
      cover.classList.add("is-hidden");
      app.classList.add("is-active");
      if (!scenarioStarted) {
        scenarioStarted = true;
        window.setTimeout(runScenario, 760);
      }
    }

    function addMessage(role, html) {
      const message = document.createElement("article");
      message.className = `message ${role}`;
      message.innerHTML = html;
      chat.appendChild(message);
    }

    function wait(ms) {
      return new Promise((resolve) => window.setTimeout(resolve, ms));
    }

    function placeCursorAt(x, y) {
      demoCursor.style.setProperty("--cursor-x", `${x}px`);
      demoCursor.style.setProperty("--cursor-y", `${y}px`);
    }

    function moveCursorTo(target, xRatio = .5, yRatio = .55) {
      const appRect = app.getBoundingClientRect();
      const targetRect = target.getBoundingClientRect();
      const cursorHotspotX = 6;
      const cursorHotspotY = 5;

      placeCursorAt(
        targetRect.left - appRect.left + targetRect.width * xRatio - cursorHotspotX,
        targetRect.top - appRect.top + targetRect.height * yRatio - cursorHotspotY
      );
    }

    function resetCursorClick() {
      demoCursor.classList.remove("is-clicking");
    }

    function openProjectMenu() {
      projectButton.classList.add("is-active");
      projectButton.setAttribute("aria-expanded", "true");
      projectMenu.classList.add("is-open");
    }

    function closeProjectMenu() {
      projectButton.classList.remove("is-active");
      projectButton.setAttribute("aria-expanded", "false");
      projectMenu.classList.remove("is-open");
    }

    function selectProject(projectName) {
      projectLabel.textContent = projectName;
      projectOptions.forEach((option) => {
        const isSelected = option.dataset.projectOption === projectName;
        option.classList.toggle("is-selected", isSelected);
        option.setAttribute("aria-selected", String(isSelected));
      });
    }

    async function chooseProject() {
      await wait(720);
      placeCursorAt(app.clientWidth * .45, app.clientHeight * .66);
      demoCursor.classList.add("is-visible");
      await wait(160);
      moveCursorTo(projectButton, .52, .58);
      await wait(1050);
      demoCursor.classList.add("is-clicking");
      await wait(260);
      resetCursorClick();
      openProjectMenu();
      await wait(720);
      moveCursorTo(projectOptions[0], .42, .55);
      await wait(1250);
      demoCursor.classList.add("is-clicking");
      selectProject(selectedProject);
      await wait(320);
      resetCursorClick();
      closeProjectMenu();
      await wait(560);
      demoCursor.classList.remove("is-visible");
    }

    async function typeScenario(text) {
      app.style.setProperty("--follow-x", "300px");
      app.style.setProperty("--shell-transition", ".9s");
      app.classList.add("is-focusing");
      input.value = "";
      typedText.textContent = "";
      typedText.classList.remove("is-visible", "is-typing");
      await wait(820);

      app.classList.remove("is-focusing");
      app.style.setProperty("--shell-transition", "1.28s");
      app.classList.add("is-following");
      await wait(360);

      input.style.color = "transparent";
      typedText.classList.add("is-visible", "is-typing");

      for (let index = 0; index < text.length; index += 1) {
        const character = text[index];
        const progress = index / Math.max(text.length - 1, 1);
        const followX = 300 - progress * 540;

        app.style.setProperty("--follow-x", `${followX}px`);
        input.value += character;
        typedText.textContent += character;
        await wait(105 + Math.random() * 65);
      }

      app.style.setProperty("--follow-x", "-240px");
      app.style.setProperty("--shell-transition", ".9s");
      typedText.classList.remove("is-typing");
    }

    async function typeTextInto(element, text, baseDelay = 20) {
      element.textContent = "";

      for (const character of text) {
        element.textContent += character;
        await wait(character === "." || character === "," ? 120 : baseDelay + Math.random() * 18);
      }
    }

    function createContextSources() {
      const row = document.createElement("span");
      row.className = "source-row";
      row.innerHTML = `
        <span>Контекст собран из</span>
        <span class="source-icons" aria-label="Календарь, заметки, почта">
          <span class="source-icon" title="Календарь" aria-label="Календарь">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M7 3v3M17 3v3M4.5 9h15M6.5 5h11A2.5 2.5 0 0 1 20 7.5v10A2.5 2.5 0 0 1 17.5 20h-11A2.5 2.5 0 0 1 4 17.5v-10A2.5 2.5 0 0 1 6.5 5Z" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
            </svg>
          </span>
          <span class="source-icon" title="Заметки" aria-label="Заметки">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M7 4h7l4 4v12H7a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2Z" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
              <path d="M14 4v5h5M8.5 13h7M8.5 16h5" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
            </svg>
          </span>
          <span class="source-icon" title="Почта" aria-label="Почта">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M5.5 6.5h13A2.5 2.5 0 0 1 21 9v7a2.5 2.5 0 0 1-2.5 2.5h-13A2.5 2.5 0 0 1 3 16V9a2.5 2.5 0 0 1 2.5-2.5Z" fill="none" stroke="currentColor" stroke-width="1.8"/>
              <path d="m4 8 8 5.5L20 8" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </span>
        </span>
      `;
      return row;
    }

    async function resetDemo() {
      await wait(520);
      app.classList.remove("is-active", "is-reading", "is-focusing", "is-following");
      cover.classList.remove("is-hidden");
      shell.classList.remove("has-chat");
      chat.innerHTML = "";
      input.value = "";
      input.style.color = "";
      typedText.textContent = "";
      typedText.classList.remove("is-visible", "is-typing");
      demoCursor.classList.remove("is-visible", "is-clicking");
      closeProjectMenu();
      selectProject("Выбрать проект");
      scenarioStarted = false;
      app.style.setProperty("--follow-x", "0px");
      app.style.setProperty("--shell-transition", ".9s");
    }

    async function renderAnswer(query) {
      const message = document.createElement("article");
      message.className = "message assistant";
      message.innerHTML = '<span class="thinking"><span></span><span></span><span></span></span>';
      chat.appendChild(message);

      await wait(1850);
      message.innerHTML = "";
      app.classList.add("is-reading");

      const text = document.createElement("span");
      text.className = "assistant-text";
      message.appendChild(text);
      await typeTextInto(text, meetingBrief, 13);
      await wait(180);
      message.appendChild(createContextSources());
      await wait(420);
      const highlight = document.createElement("span");
      highlight.className = "assistant-highlight";
      message.appendChild(highlight);
      await typeTextInto(highlight, meetingHighlight, 13);
      await wait(520);
      app.classList.remove("is-reading");
      await wait(520);

      const ctaMessage = document.createElement("article");
      ctaMessage.className = "message cta";
      const button = document.createElement("button");
      button.className = "join-meeting";
      button.type = "button";
      button.textContent = "Присоединиться ко встрече";
      ctaMessage.appendChild(button);
      chat.appendChild(ctaMessage);
      await wait(260);
      button.classList.add("is-visible");
      await wait(520);
      moveCursorTo(button, .52, .55);
      demoCursor.classList.add("is-visible");
      await wait(420);
      demoCursor.classList.add("is-clicking");
      await wait(460);
      button.style.transform = "scale(.97)";
      await wait(170);
      button.style.transform = "";
      await resetDemo();
    }

    function submitQuery(rawQuery) {
      const query = rawQuery.trim() || "Что требует моего внимания сегодня?";
      shell.classList.add("has-chat");
      app.classList.remove("is-focusing");
      app.classList.remove("is-following");
      addMessage("user", query);
      input.value = "";
      input.style.color = "";
      typedText.textContent = "";
      typedText.classList.remove("is-visible", "is-typing");
      window.setTimeout(() => renderAnswer(query), 920);
    }

    async function runScenario() {
      await chooseProject();
      await wait(320);
      await typeScenario(scenarioQuery);
      await wait(980);
      sendButton.disabled = false;
      sendButton.classList.add("is-sending");
      await wait(420);
      submitQuery(scenarioQuery);
      sendButton.disabled = true;
      sendButton.classList.remove("is-sending");
    }

    start.addEventListener("click", openDemo);

    projectButton.addEventListener("click", () => {
      if (projectMenu.classList.contains("is-open")) {
        closeProjectMenu();
      } else {
        openProjectMenu();
      }
    });

    projectOptions.forEach((option) => {
      option.addEventListener("click", () => {
        selectProject(option.dataset.projectOption);
        closeProjectMenu();
      });
    });

    form.addEventListener("submit", (event) => {
      event.preventDefault();
    });
  </script>
</body>
</html>
